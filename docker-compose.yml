services:
  resume-matcher:
    build:
      context: .
      dockerfile: Dockerfile
      # Build args for customizing the frontend API URL at build time
      # IMPORTANT: NEXT_PUBLIC_API_URL is baked into the JS bundle during build.
      # If you change BACKEND_PORT, you must rebuild with matching NEXT_PUBLIC_API_URL:
      #   BACKEND_PORT=9000 docker-compose build --build-arg NEXT_PUBLIC_API_URL=http://localhost:9000
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-3210}
    image: resume-matcher
    container_name: resume-matcher
    # Port mapping: HOST_PORT:CONTAINER_PORT
    # start.sh binds to FRONTEND_PORT/BACKEND_PORT inside the container,
    # so both sides of the mapping must use the same value.
    ports:
      - "${FRONTEND_PORT:-3211}:${FRONTEND_PORT:-3211}"   # Frontend (Next.js)
      - "${BACKEND_PORT:-3210}:${BACKEND_PORT:-3210}"     # Backend API (FastAPI)
    volumes:
      - resume-data:/app/backend/data
    environment:
      - NODE_ENV=production
      # Pass port configuration to container for internal use
      - FRONTEND_PORT=${FRONTEND_PORT:-3211}
      - BACKEND_PORT=${BACKEND_PORT:-3210}
      # LLM Configuration - configure via Settings UI or set env vars for explicit overrides
      # Supported providers: openai, anthropic, openrouter, gemini, deepseek, ollama
      # Defaults are defined in apps/backend/app/config.py
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # For Ollama running on host machine, use host.docker.internal:
      # - LLM_API_BASE=http://host.docker.internal:11434
      - LLM_API_BASE=${LLM_API_BASE:-}
      # Authentication — set a strong random secret in production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${BACKEND_PORT:-3210}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  resume-data:
    driver: local
